<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holographic Wireframe Avatar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 40%, #0c1a2e 0%, #060d18 60%, #020709 100%);
      font-family: 'Exo 2', sans-serif;
      overflow: hidden;
      color: #e2e8f0;
    }

    /* Subtle scanline overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none; z-index: 100;
    }

    #app-container {
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      height: 100vh; width: 100vw;
      perspective: 900px;
      gap: 0;
    }

    /* 3D hologram wrapper */
    #hologram-wrapper {
      width: 300px; height: 300px;
      position: relative;
      transform-style: preserve-3d;
      animation: ambientDrift 9s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 18px rgba(56,189,248,0.35)) drop-shadow(0 0 40px rgba(14,165,233,0.15));
    }

    @keyframes ambientDrift {
      0%   { transform: rotateY(-10deg) rotateX(3deg) translateY(-6px); }
      100% { transform: rotateY(10deg)  rotateX(-3deg) translateY(6px); }
    }

    /* Rotating base ring beneath face */
    #base-ring {
      position: absolute;
      bottom: -18px; left: 50%;
      transform: translateX(-50%);
      width: 180px; height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(56,189,248,0.25);
      background: radial-gradient(ellipse, rgba(56,189,248,0.08) 0%, transparent 70%);
      animation: ringPulse 3s ease-in-out infinite alternate;
    }
    @keyframes ringPulse {
      0%   { opacity: 0.4; transform: translateX(-50%) scaleX(0.85); }
      100% { opacity: 0.9; transform: translateX(-50%) scaleX(1.1); }
    }

    #avatar-svg { width: 100%; height: 100%; }

    /* Scan line that sweeps the face */
    #scan-line {
      animation: scanSweep 4s ease-in-out infinite;
    }
    @keyframes scanSweep {
      0%   { transform: translateY(-90px); opacity: 0; }
      10%  { opacity: 0.6; }
      80%  { opacity: 0.3; }
      100% { transform: translateY(90px); opacity: 0; }
    }

    /* Eye blink */
    #eye-lid-l, #eye-lid-r {
      animation: blink 6s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      94%           { transform: scaleY(0.08); }
    }

    /* Pupil idle glow pulse */
    .pupil-glow {
      animation: pupilPulse 3s ease-in-out infinite alternate;
    }
    @keyframes pupilPulse {
      0%   { opacity: 0.7; r: 2.5; }
      100% { opacity: 1.0; r: 3.2; }
    }

    /* UI Panel */
    #ui-panel {
      width: 90%; max-width: 400px;
      background: rgba(8, 18, 32, 0.82);
      backdrop-filter: blur(16px);
      padding: 20px 24px 22px;
      border-radius: 12px;
      border: 1px solid rgba(56,189,248,0.12);
      border-top: 1px solid rgba(56,189,248,0.28);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7), inset 0 1px 0 rgba(56,189,248,0.08);
      text-align: center;
      position: relative;
      margin-top: 4px;
    }
    #ui-panel::before {
      content: '';
      position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(56,189,248,0.5), transparent);
    }

    #status {
      font-family: 'Share Tech Mono', monospace;
      color: #64748b; font-size: 10px;
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 12px;
      transition: color 0.4s;
    }

    #response-box {
      font-family: 'Exo 2', sans-serif;
      font-weight: 300;
      color: #cbd5e1; font-size: 13px;
      max-height: 88px; overflow-y: auto;
      margin-bottom: 16px;
      text-align: left;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.04);
      line-height: 1.55;
    }

    button {
      background: linear-gradient(135deg, #0369a1, #0284c7, #0ea5e9);
      color: #e0f2fe;
      border: none; border-top: 1px solid rgba(186,230,253,0.25);
      padding: 13px;
      border-radius: 7px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px; letter-spacing: 1px;
      cursor: pointer; width: 100%;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    button:hover:not(:disabled) {
      background: linear-gradient(135deg, #0284c7, #0ea5e9, #38bdf8);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(14,165,233,0.4);
    }
    button:disabled { background: #1e293b; color: #475569; cursor: not-allowed; transform: none; box-shadow: none; }

    input {
      width: 100%; padding: 11px 12px;
      margin-bottom: 14px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(51,65,85,0.8);
      border-radius: 6px; color: #94a3b8;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; text-align: center;
      letter-spacing: 1px;
      transition: border-color 0.2s, color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: rgba(56,189,248,0.5);
      color: #e2e8f0;
    }
    input::placeholder { color: #334155; letter-spacing: 1px; }
  </style>
</head>
<body>

<div id="app-container">
  <div id="hologram-wrapper">
    <div id="base-ring"></div>

    <svg id="avatar-svg" viewBox="0 0 200 210">
      <defs>
        <!-- Main mesh gradient -->
        <linearGradient id="mg" x1="20%" y1="0%" x2="80%" y2="100%">

          <stop offset="45%"  stop-color="#38bdf8" stop-opacity="0.7"/>

        <!-- Scan line gradient -->
        <linearGradient id="slg" x1="0%" y1="0%" x2="100%" y2="0%">

        <clipPath id="faceClip">

      <path id="inner-mouth"
            d="M80 131 C88 135, 96 137, 100 137 C104 137, 112 135, 120 131"
            fill="rgba(2,132,199,0.08)" stroke="#38bdf8" stroke-width="0.85"/>
      <!-- Jaw horizontal ring (animated) -->
      <path id="jaw-ring"
            d="M56 145 C68 139, 82 137, 96 138 C98 138, 99 138, 100 138 C101 138, 102 138, 104 138 C118 137, 132 139, 144 145"
            fill="none" stroke="#0ea5e9" stroke-width="0.9" opacity="0.7"/>
      <!-- Main jaw mesh polygon (animated) -->
      <path id="jaw-mesh"
            d="M56 144 L70 140 L86 138 L100 139 L114 138 L130 140 L144 144 L142 158 L130 168 L116 175 L100 178 L84 175 L70 168 L58 158 Z"
            fill="rgba(2,132,199,0.05)" stroke="#38bdf8" stroke-width="1.5"/>
      <!-- Secondary jaw ring lower (animated) -->
      <path id="jaw-ring2"
            d="M60 158 C72 153, 84 151, 100 152 C116 151, 128 153, 140 158"
            fill="none" stroke="#38bdf8" stroke-width="0.75" opacity="0.55"/>
      <!-- Chin arch (animated) -->
      <path id="chin-detail"
            d="M72 164 C80 170, 90 174, 100 175 C110 174, 120 170, 128 164"
            fill="none" stroke="#38bdf8" stroke-width="0.9" opacity="0.72"/>
      <!-- Chin center vertex -->
      <circle id="chin-dot" cx="100" cy="175" r="1.6" fill="#38bdf8" opacity="0.85"/>

      <!-- ===== NECK SUGGESTION ===== -->
      <path d="M82 178 C84 186, 90 192, 100 194 C110 192, 116 186, 118 178"
            fill="none" stroke="#38bdf8" stroke-width="0.7" opacity="0.28"/>
      <line x1="90"  y1="180" x2="90"  y2="198" stroke="#38bdf8" stroke-width="0.5" opacity="0.18"/>
      <line x1="100" y1="183" x2="100" y2="200" stroke="#38bdf8" stroke-width="0.5" opacity="0.18"/>
      <line x1="110" y1="180" x2="110" y2="198" stroke="#38bdf8" stroke-width="0.5" opacity="0.18"/>

      <!-- ===== KEY VERTEX DOTS (structural landmarks) ===== -->
      <circle cx="100" cy="9"   r="1.8" fill="#7dd3fc" opacity="0.95"/>
      <circle cx="100" cy="28"  r="1.2" fill="#38bdf8" opacity="0.6"/>
      <circle cx="100" cy="48"  r="1.2" fill="#38bdf8" opacity="0.55"/>
      <circle cx="38"  cy="38"  r="1.2" fill="#38bdf8" opacity="0.6"/>
      <circle cx="162" cy="38"  r="1.2" fill="#38bdf8" opacity="0.6"/>
      <circle cx="30"  cy="105" r="1.2" fill="#0ea5e9" opacity="0.45"/>
      <circle cx="170" cy="105" r="1.2" fill="#0ea5e9" opacity="0.45"/>
      <circle cx="56"  cy="144" r="1.2" fill="#38bdf8" opacity="0.7"/>
      <circle cx="144" cy="144" r="1.2" fill="#38bdf8" opacity="0.7"/>

      <!-- ===== SWEEPING SCAN LINE ===== -->
      <g clip-path="url(#faceClip)">
        <rect id="scan-line" x="20" width="160" height="1.5" y="100"
              fill="url(#slg)" opacity="0.7"/>
      </g>
    </svg>
  </div>

  <div id="ui-panel">
    <input type="password" id="api-key" placeholder="[ GEMINI API KEY ]">
    <div id="status">System Standby</div>
    <div id="response-box">Tap the button below to initialize the audio stream...</div>
    <button id="mic-btn">⬡ Initiate Neural Link</button>
  </div>
</div>

<script>
  // ─── DOM references ───
  const micBtn      = document.getElementById('mic-btn');
  const status      = document.getElementById('status');
  const responseBox = document.getElementById('response-box');
  const apiKeyInput = document.getElementById('api-key');

  // Animated jaw elements
  const lowerLip   = document.getElementById('lower-lip');
  const innerMouth = document.getElementById('inner-mouth');
  const jawMesh    = document.getElementById('jaw-mesh');
  const jawRing    = document.getElementById('jaw-ring');
  const jawRing2   = document.getElementById('jaw-ring2');
  const chinDetail = document.getElementById('chin-detail');
  const chinDot    = document.getElementById('chin-dot');

  // Resting path data
  const REST = {
    lowerLip:   'M76 133 C84 138, 94 141, 100 141 C106 141, 116 138, 124 133',
    innerMouth: 'M80 131 C88 135, 96 137, 100 137 C104 137, 112 135, 120 131',
    jawRing:    'M56 145 C68 139, 82 137, 96 138 C98 138, 99 138, 100 138 C101 138, 102 138, 104 138 C118 137, 132 139, 144 145',
    jawMesh:    'M56 144 L70 140 L86 138 L100 139 L114 138 L130 140 L144 144 L142 158 L130 168 L116 175 L100 178 L84 175 L70 168 L58 158 Z',
    jawRing2:   'M60 158 C72 153, 84 151, 100 152 C116 151, 128 153, 140 158',
    chinDetail: 'M72 164 C80 170, 90 174, 100 175 C110 174, 120 170, 128 164',
    chinDotCY:  '175'
  };

  let lipsyncTimer = null;

  // ─── Lipsync: morph jaw mesh based on open amount ───
  function engageMouthMovement() {
    clearInterval(lipsyncTimer);
    lipsyncTimer = setInterval(() => {
      const open = Math.random() * 20;
      const w    = Math.random() * 3;

      // Lower lip drops
      const llMid = (141 + open * 0.75).toFixed(1);
      lowerLip.setAttribute('d',
        `M76 133 C84 ${(138 + open * 0.8).toFixed(1)}, 94 ${llMid}, 100 ${(parseFloat(llMid)+1).toFixed(1)} C106 ${llMid}, 116 ${(138 + open * 0.8).toFixed(1)}, 124 133`
      );

      // Inner mouth opens
      const imMid = (137 + open * 0.55).toFixed(1);
      innerMouth.setAttribute('d',
        `M80 131 C88 ${(135 + open * 0.65).toFixed(1)}, 96 ${imMid}, 100 ${(parseFloat(imMid)+1).toFixed(1)} C104 ${imMid}, 112 ${(135 + open * 0.65).toFixed(1)}, 120 131`
      );

      // Jaw ring drops
      const jrBase = (145 + open * 0.35).toFixed(1);
      const jrMid  = (138 + open * 0.35).toFixed(1);
      jawRing.setAttribute('d',
        `M56 ${jrBase} C68 ${jrMid}, 82 ${(parseFloat(jrMid)-1).toFixed(1)}, 96 ${jrMid} C98 ${jrMid}, 99 ${jrMid}, 100 ${jrMid} C101 ${jrMid}, 102 ${jrMid}, 104 ${jrMid} C118 ${(parseFloat(jrMid)-1).toFixed(1)}, 132 ${jrMid}, 144 ${jrBase}`
      );

      // Main jaw mesh morphs
      const jawMidY  = (138 + open * 0.4).toFixed(1);
      const jawLowY  = (158 + open * 0.6).toFixed(1);
      const jawSideY = (168 + open * 0.7).toFixed(1);
      const jawWingY = (175 + open * 0.8).toFixed(1);
      const chinY    = (178 + open).toFixed(1);
      const wL = (70 - w).toFixed(1);
      const wR = (130 + w).toFixed(1);
      jawMesh.setAttribute('d',
        `M56 144 L70 140 L86 ${jawMidY} L100 ${(parseFloat(jawMidY)+1).toFixed(1)} L114 ${jawMidY} L130 140 L144 144 L142 ${jawLowY} L${wR} ${jawSideY} L116 ${jawWingY} L100 ${chinY} L84 ${jawWingY} L${wL} ${jawSideY} L58 ${jawLowY} Z`
      );

      // Lower jaw ring2 drops
      const jr2Base = (158 + open * 0.55).toFixed(1);
      const jr2Mid  = (151 + open * 0.55).toFixed(1);
      jawRing2.setAttribute('d',
        `M60 ${jr2Base} C72 ${jr2Mid}, 84 ${(parseFloat(jr2Mid)-1).toFixed(1)}, 100 ${jr2Mid} C116 ${(parseFloat(jr2Mid)-1).toFixed(1)}, 128 ${jr2Mid}, 140 ${jr2Base}`
      );

      // Chin arch drops
      const cdBase = (164 + open * 0.5).toFixed(1);
      const cdMid  = (175 + open * 0.8).toFixed(1);
      chinDetail.setAttribute('d',
        `M72 ${cdBase} C80 ${(parseFloat(cdBase)+6).toFixed(1)}, 90 ${cdMid}, 100 ${(parseFloat(cdMid)+2).toFixed(1)} C110 ${cdMid}, 120 ${(parseFloat(cdBase)+6).toFixed(1)}, 128 ${cdBase}`
      );

      // Chin dot drops
      chinDot.setAttribute('cy', (175 + open).toFixed(1));

    }, 65);
  }

  // ─── Settle back to resting position ───
  function settleMouthPosition() {
    clearInterval(lipsyncTimer);
    lowerLip.setAttribute('d',   REST.lowerLip);
    innerMouth.setAttribute('d', REST.innerMouth);
    jawRing.setAttribute('d',    REST.jawRing);
    jawMesh.setAttribute('d',    REST.jawMesh);
    jawRing2.setAttribute('d',   REST.jawRing2);
    chinDetail.setAttribute('d', REST.chinDetail);
    chinDot.setAttribute('cy',   REST.chinDotCY);
  }

  // ─── Speech Recognition setup ───
  let voiceRecognizer = null;
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechLib = window.SpeechRecognition || window.webkitSpeechRecognition;
    voiceRecognizer = new SpeechLib();
    voiceRecognizer.continuous    = false;
    voiceRecognizer.interimResults = false;
    voiceRecognizer.lang          = 'en-US';

    voiceRecognizer.onstart = () => {
      status.textContent = 'Awaiting Audio Input...';
      status.style.color = '#38bdf8';
    };
    voiceRecognizer.onerror = () => {
      status.textContent = 'Audio Pipeline Failed';
      status.style.color = '#ef4444';
      micBtn.disabled = false;
    };
    voiceRecognizer.onresult = async (e) => {
      const prompt = e.results[0][0].transcript;
      status.textContent = 'Processing via Gemini...';
      status.style.color = '#fcd34d';
      await streamGeminiPayload(prompt);
    };
  } else {
    micBtn.textContent = 'Hardware Engine Unsupported';
    micBtn.disabled    = true;
  }

  // ─── Gemini API call ───
  async function streamGeminiPayload(prompt) {
    const key = apiKeyInput.value.trim();
    if (!key) {
      status.textContent = 'Error: Authentication Key Missing';
      status.style.color = '#ef4444';
      micBtn.disabled    = false;
      return;
    }
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        }
      );
      const data = await res.json();
      const text = data.candidates[0].content.parts[0].text;
      responseBox.textContent = text;
      processTextToVocalHardware(text);
    } catch (err) {
      console.error(err);
      status.textContent = 'Network Uplink Terminated';
      status.style.color = '#ef4444';
      micBtn.disabled    = false;
    }
  }

  // ─── Text-to-Speech ───
  function processTextToVocalHardware(text) {
    const clean = text.replace(/[*#`_\-]/g, '');
    const utterance = new SpeechSynthesisUtterance(clean);
    const voices = window.speechSynthesis.getVoices();
    const voice  = voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) || voices[0];
    if (voice) utterance.voice = voice;
    utterance.rate  = 1.05;
    utterance.pitch = 0.9;

    utterance.onstart = () => {
      status.textContent = 'Avatar Voice Active';
      status.style.color = '#10b981';
      engageMouthMovement();
    };
    utterance.onend = () => {
      status.textContent = 'System Standby';
      status.style.color = '#64748b';
      micBtn.disabled    = false;
      settleMouthPosition();
    };
    utterance.onerror = () => {
      status.textContent = 'System Standby';
      status.style.color = '#64748b';
      micBtn.disabled    = false;
      settleMouthPosition();
    };
    window.speechSynthesis.speak(utterance);
  }

  // ─── Button click ───
  micBtn.addEventListener('click', () => {
    if (!voiceRecognizer) return;
    micBtn.disabled = true;
    window.speechSynthesis.getVoices();
    voiceRecognizer.start();
  });
</script>

</body>
</html>
