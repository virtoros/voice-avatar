<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Automated Wireframe Avatar</title>
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      font-family: system-ui, sans-serif; overflow: hidden;
      color: #f8f9fa;
    }
    #app-container {
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; height: 100vh; width: 100vw;
      perspective: 800px; /* Forces 3D depth rendering */
    }
    
    /* 3D Hologram Container Animation */
    #hologram-wrapper {
      width: 280px; height: 280px; margin-bottom: 30px;
      transform-style: preserve-3d;
      animation: ambientDrift 8s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.4));
    }
    
    @keyframes ambientDrift {
      0% { transform: rotateY(-12deg) rotateX(2deg) translateY(-5px); }
      100% { transform: rotateY(12deg) rotateX(-2deg) translateY(5px); }
    }

    #avatar-svg {
      width: 100%; height: 100%;
    }

    /* Core UI Elements */
    #ui-panel {
      width: 90%; max-width: 420px; background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px); padding: 24px; border-radius: 16px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
      border: 1px solid rgba(56, 189, 248, 0.15);
      border-top: 1px solid rgba(56, 189, 248, 0.3);
      text-align: center; box-sizing: border-box; z-index: 10;
    }
    #status { 
      color: #94a3b8; font-size: 11px; text-transform: uppercase; 
      letter-spacing: 1.5px; margin-bottom: 16px; font-weight: bold; 
    }
    #response-box { 
      color: #e2e8f0; font-size: 14px; max-height: 100px; overflow-y: auto; 
      margin-bottom: 16px; text-align: left; background: rgba(0,0,0,0.3); 
      padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);
      line-height: 1.5; font-weight: 300;
    }
    button {
      background: linear-gradient(135deg, #3b82f6, #2563eb); 
      color: white; border: none; padding: 14px;
      border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; width: 100%;
      transition: all 0.2s; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); }
    button:disabled { background: #475569; cursor: not-allowed; box-shadow: none; transform: none; }
    input { 
      width: 100%; padding: 12px; margin-bottom: 16px; background: rgba(0,0,0,0.4); 
      border: 1px solid #334155; border-radius: 8px; color: white; 
      box-sizing: border-box; font-size: 13px; text-align: center;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #38bdf8; }
  </style>
</head>
<body>

<div id="app-container">
  
  <div id="hologram-wrapper">
    <svg id="avatar-svg" viewBox="0 0 200 200">
      <defs>
        <linearGradient id="mesh-glow" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.8"/>
          <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#0284c7" stop-opacity="0.2"/>
        </linearGradient>
      </defs>

      <path d="M100 15 L145 30 L175 75 L165 130 L135 170 L100 190 L65 170 L35 130 L25 75 L55 30 Z" 
            fill="none" stroke="url(#mesh-glow)" stroke-width="1" stroke-dasharray="2,2" opacity="0.5" />
      
      <path d="M100 15 L100 45 M55 30 L80 40 L100 45 L120 40 L145 30 
               M25 75 L60 70 L100 75 L140 70 L175 75
               M60 70 L75 95 L100 100 L125 95 L140 70
               M35 130 L60 115 L75 95 M165 130 L140 115 L125 95
               M100 75 L100 120 L85 130 L100 135 L115 130 L100 120" 
            fill="none" stroke="#38bdf8" stroke-width="1.2" opacity="0.75" />
            
      <g stroke="#7dd3fc" stroke-width="1.5">
        <polygon points="60,85 75,80 90,85 75,90" fill="rgba(56,189,248,0.2)" />
        <circle cx="75" cy="85" r="2" fill="#bae6fd" />
        <polygon points="110,85 125,80 140,85 125,90" fill="rgba(56,189,248,0.2)" />
        <circle cx="125" cy="85" r="2" fill="#bae6fd" />
      </g>
      
      <path d="M60 115 L80 135 L100 135 L120 135 L140 115" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.6" />

      <path id="jaw-mesh" d="M65 150 L85 140 L100 145 L115 140 L135 150 L115 170 L100 180 L85 170 Z" 
            fill="rgba(2,132,199,0.05)" stroke="#38bdf8" stroke-width="1.5" />
            
      <path id="inner-mouth" d="M80 145 L100 150 L120 145" fill="none" stroke="#7dd3fc" stroke-width="0.8" opacity="0.8" />
    </svg>
  </div>

  <div id="ui-panel">
    <input type="password" id="api-key" placeholder="Enter Gemini API Key">
    <div id="status">System Standby</div>
    <div id="response-box">Tap the button below to initialize the audio stream...</div>
    <button id="mic-btn">Initiate Neural Link</button>
  </div>
</div>

<script>
  const jawMesh = document.getElementById('jaw-mesh');
  const innerMouth = document.getElementById('inner-mouth');
  const micBtn = document.getElementById('mic-btn');
  const status = document.getElementById('status');
  const responseBox = document.getElementById('response-box');
  const apiKeyInput = document.getElementById('api-key');

  let lipsyncTimer = null;
  let voiceRecognizer = null;

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechLib = window.SpeechRecognition || window.webkitSpeechRecognition;
    voiceRecognizer = new SpeechLib();
    voiceRecognizer.continuous = false;
    voiceRecognizer.interimResults = false;
    voiceRecognizer.lang = 'en-US';

    voiceRecognizer.onstart = () => { 
      status.textContent = "Awaiting Audio Input..."; 
      status.style.color = "#38bdf8";
    };
    
    voiceRecognizer.onerror = () => { 
      status.textContent = "Audio Pipeline Failed"; 
      status.style.color = "#ef4444";
      micBtn.disabled = false; 
    };
    
    voiceRecognizer.onresult = async (event) => {
      const userPrompt = event.results[0][0].transcript;
      status.textContent = "Processing via Gemini...";
      status.style.color = "#fcd34d";
      await streamGeminiPayload(userPrompt);
    };
  } else {
    micBtn.textContent = "Hardware Engine Unsupported";
    micBtn.disabled = true;
  }

  function engageMouthMovement() {
    clearInterval(lipsyncTimer);
    lipsyncTimer = setInterval(() => {
      // Generate randomized but organic feeling displacement
      const openAmount = Math.random() * 20; 
      const widthFlex = Math.random() * 4;
      
      const lipY = (145 + openAmount * 0.4).toFixed(1);
      const chinY = (180 + openAmount).toFixed(1);
      const jawY = (170 + openAmount * 0.7).toFixed(1);
      
      const leftJawX = (85 - widthFlex).toFixed(1);
      const rightJawX = (115 + widthFlex).toFixed(1);

      // Morph the main jaw
      jawMesh.setAttribute('d', 
        `M65 150 L85 140 L100 ${lipY} L115 140 L135 150 L${rightJawX} ${jawY} L100 ${chinY} L${leftJawX} ${jawY} Z`
      );
      
      // Morph the inner mouth line to give depth
      const innerY = (150 + openAmount * 0.6).toFixed(1);
      innerMouth.setAttribute('d', `M80 145 L100 ${innerY} L120 145`);
      
    }, 70); // Slightly faster interval for snappier, robotic lip sync
  }

  function settleMouthPosition() {
    clearInterval(lipsyncTimer);
    // Return vertices to exact resting state
    jawMesh.setAttribute('d', 'M65 150 L85 140 L100 145 L115 140 L135 150 L115 170 L100 180 L85 170 Z');
    innerMouth.setAttribute('d', 'M80 145 L100 150 L120 145');
  }

  async function streamGeminiPayload(prompt) {
    const accessKey = apiKeyInput.value.trim();
    if (!accessKey) { 
      status.textContent = "Error: Authentication Key Missing"; 
      status.style.color = "#ef4444";
      micBtn.disabled = false; 
      return; 
    }

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${accessKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      
      const parsedData = await response.json();
      const rawText = parsedData.candidates[0].content.parts[0].text;
      
      responseBox.textContent = rawText;
      processTextToVocalHardware(rawText);
    } catch (err) {
      console.error(err);
      status.textContent = "Network Uplink Terminated";
      status.style.color = "#ef4444";
      micBtn.disabled = false;
    }
  }

  function processTextToVocalHardware(text) {
    const sanitizedText = text.replace(/[*#`_\-]/g, '');
    const speechStream = new SpeechSynthesisUtterance(sanitizedText);
    
    // Attempt to select a tech-sounding or default English voice
    const voices = window.speechSynthesis.getVoices();
    const preferredVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) || voices[0];
    if (preferredVoice) speechStream.voice = preferredVoice;
    
    speechStream.rate = 1.05; // Slightly faster for a crisp, AI-like cadence
    speechStream.pitch = 0.9;

    speechStream.onstart = () => {
      status.textContent = "Avatar Voice Active";
      status.style.color = "#10b981";
      engageMouthMovement();
    };
    
    speechStream.onend = () => {
      status.textContent = "System Standby";
      status.style.color = "#94a3b8";
      micBtn.disabled = false;
      settleMouthPosition();
    };

    speechStream.onerror = () => {
      status.textContent = "System Standby";
      status.style.color = "#94a3b8";
      micBtn.disabled = false;
      settleMouthPosition();
    };

    window.speechSynthesis.speak(speechStream);
  }

  micBtn.addEventListener('click', () => {
    if (!voiceRecognizer) return;
    micBtn.disabled = true;
    
    // Ensures voices are loaded in browser memory before initiating
    window.speechSynthesis.getVoices(); 
    
    voiceRecognizer.start();
  });
</script>

</body>
</html>
