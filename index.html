<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Voice-Automated Wireframe Avatar</title>
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #0f172a; font-family: system-ui, sans-serif; overflow: hidden;
    }
    #app-container {
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; height: 100vh; width: 100vw;
    }
    #avatar-svg {
      max-width: 280px; max-height: 280px; margin-bottom: 24px;
      /* Adds the digital holographic glow effect */
      filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6));
    }
    #ui-panel {
      width: 90%; max-width: 400px; background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(8px); padding: 20px; border-radius: 16px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
      text-align: center;
    }
    #status {
      color: #38bdf8; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 16px; font-weight: bold;
    }
    button {
      background: #10b981; color: white; border: none; padding: 14px 28px;
      border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px;
      transition: background 0.2s, transform 0.1s; width: 100%;
    }
    button:hover { background: #059669; }
    button:active { transform: scale(0.98); }
    .listening { background: #ef4444 !important; }
  </style>
</head>
<body>

<div id="app-container">
  <svg id="avatar-svg" viewBox="0 0 200 200">
    <path id="wireframe-contour" d="M100 20 L155 45 L170 100 L150 155 L100 185 L50 155 L30 100 L45 45 Z" 
          fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.4" />
    
    <path id="wireframe-inner" d="M100 20 L100 70 M45 45 L100 70 L155 45 M30 100 L75 90 L100 70 L125 90 L170 100 M50 155 L75 130 L100 110 L125 130 L150 155" 
          fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.3" />
          
    <circle cx="75" cy="90" r="5" fill="none" stroke="#38bdf8" stroke-width="2" />
    <circle cx="75" cy="90" r="1.5" fill="#38bdf8" />
    <circle cx="125" cy="90" r="5" fill="none" stroke="#38bdf8" stroke-width="2" />
    <circle cx="125" cy="90" r="1.5" fill="#38bdf8" />
    
    <path id="jaw-mesh" d="M75 130 L100 135 L125 130 L100 145 Z" 
          fill="none" stroke="#38bdf8" stroke-width="2" />
  </svg>

  <div id="ui-panel">
    <div id="status">Audio Engine Offline</div>
    <button id="start-btn">Connect Audio Stream</button>
  </div>
</div>

<script>
  const jawMesh = document.getElementById('jaw-mesh');
  const startBtn = document.getElementById('start-btn');
  const status = document.getElementById('status');

  let audioContext = null;
  let analyser = null;
  let dataArray = null;
  let isListening = false;

  async function initializeAudioPipeline() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaStreamSource(stream);
      
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256; 
      
      source.connect(analyser);
      
      const bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);
      
      isListening = true;
      status.textContent = "Monitoring System Audio... Speak or Play Gemini";
      status.style.color = "#10b981";
      startBtn.textContent = "Disconnect Stream";
      startBtn.classList.add('listening');
      
      renderLipsyncLoop();
    } catch (err) {
      console.error(err);
      status.textContent = "Mic/Stereo Permission Denied";
      status.style.color = "#ef4444";
    }
  }

  function renderLipsyncLoop() {
    if (!isListening) return;

    analyser.getByteFrequencyData(dataArray);
    
    let vocalRangeSum = 0;
    const peakVocalBins = 30; 
    for(let i = 0; i < peakVocalBins; i++) {
      vocalRangeSum += dataArray[i];
    }
    const averageVolume = vocalRangeSum / peakVocalBins;
    
    // Convert audio intensity directly into vertical vertex morphing
    const intensityScaler = 0.15; 
    let displacement = averageVolume * intensityScaler;
    
    if (displacement > 35) displacement = 35; // Prevents vector structural breaking
    
    // Dynamically morph the coordinates of the polygon jaw path
    const targetY1 = (135 + displacement).toFixed(1);
    const targetY2 = (145 + displacement * 1.5).toFixed(1);
    const updatedPath = `M75 130 L100 ${targetY1} L125 130 L100 ${targetY2} Z`;
    
    jawMesh.setAttribute('d', updatedPath);
    
    requestAnimationFrame(renderLipsyncLoop);
  }

  function stopAudioPipeline() {
    isListening = false;
    if (audioContext) audioContext.close();
    
    // Reset path back to original structural blueprint values
    jawMesh.setAttribute('d', 'M75 130 L100 135 L125 130 L100 145 Z');
    
    status.textContent = "Audio Engine Offline";
    status.style.color = "#38bdf8";
    startBtn.textContent = "Connect Audio Stream";
    startBtn.classList.remove('listening');
  }

  startBtn.addEventListener('click', () => {
    if (!isListening) {
      initializeAudioPipeline();
    } else {
      stopAudioPipeline();
    }
  });
</script>

</body>
</html>
