<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Automated Wireframe Avatar</title>
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #0f172a; font-family: system-ui, sans-serif; overflow: hidden;
    }
    #app-container {
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; height: 100vh; width: 100vw;
    }
    #avatar-svg {
      max-width: 250px; max-height: 250px; margin-bottom: 24px;
      filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6));
    }
    #ui-panel {
      width: 90%; max-width: 420px; background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(8px); padding: 20px; border-radius: 16px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05);
      text-align: center; box-sizing: border-box;
    }
    #status { 
      color: #94a3b8; font-size: 11px; text-transform: uppercase; 
      letter-spacing: 1px; margin-bottom: 16px; font-weight: bold; 
    }
    #response-box { 
      color: #f8f9fa; font-size: 14px; max-height: 90px; overflow-y: auto; 
      margin-bottom: 16px; text-align: left; background: #1e293b; 
      padding: 10px; border-radius: 8px; border: 1px solid #334155;
    }
    button {
      background: #2563eb; color: white; border: none; padding: 14px;
      border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; width: 100%;
      transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #475569; cursor: not-allowed; }
    input { 
      width: 100%; padding: 10px; margin-bottom: 12px; background: #1e293b; 
      border: 1px solid #334155; border-radius: 8px; color: white; 
      box-sizing: border-box; font-size: 13px; text-align: center;
    }
  </style>
</head>
<body>

<div id="app-container">
  <svg id="avatar-svg" viewBox="0 0 200 200">
    <path d="M100 20 L155 45 L170 100 L150 155 L100 185 L50 155 L30 100 L45 45 Z" fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.4" />
    <path d="M100 20 L100 70 M45 45 L100 70 L155 45 M30 100 L75 90 L100 70 L125 90 L170 100 M50 155 L75 130 L100 110 L125 130 L150 155" fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.3" />
    
    <circle cx="75" cy="90" r="5" fill="none" stroke="#38bdf8" stroke-width="2" />
    <circle cx="75" cy="90" r="1.5" fill="#38bdf8" />
    <circle cx="125" cy="90" r="5" fill="none" stroke="#38bdf8" stroke-width="2" />
    <circle cx="125" cy="90" r="1.5" fill="#38bdf8" />
    
    <path id="jaw-mesh" d="M75 130 L100 135 L125 130 L100 145 Z" fill="none" stroke="#38bdf8" stroke-width="2" />
  </svg>

  <div id="ui-panel">
    <input type="password" id="api-key" placeholder="Paste Gemini API Key Here">
    <div id="status">System Disconnected</div>
    <div id="response-box">Tap the button below to speak...</div>
    <button id="mic-btn">Tap to Talk to Avatar</button>
  </div>
</div>

<script>
  const jawMesh = document.getElementById('jaw-mesh');
  const micBtn = document.getElementById('mic-btn');
  const status = document.getElementById('status');
  const responseBox = document.getElementById('response-box');
  const apiKeyInput = document.getElementById('api-key');

  let lipsyncTimer = null;
  let voiceRecognizer = null;

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechLib = window.SpeechRecognition || window.webkitSpeechRecognition;
    voiceRecognizer = new SpeechLib();
    voiceRecognizer.continuous = false;
    voiceRecognizer.interimResults = false;
    voiceRecognizer.lang = 'en-US';

    voiceRecognizer.onstart = () => { 
      status.textContent = "Listening to your voice..."; 
      status.style.color = "#38bdf8";
    };
    
    voiceRecognizer.onerror = () => { 
      status.textContent = "Voice collection failed."; 
      status.style.color = "#ef4444";
      micBtn.disabled = false; 
    };
    
    voiceRecognizer.onresult = async (event) => {
      const userPrompt = event.results[0][0].transcript;
      status.textContent = "Sending stream to Google AI...";
      await streamGeminiPayload(userPrompt);
    };
  } else {
    micBtn.textContent = "Hardware Engine Unsupported";
    micBtn.disabled = true;
  }

  function engageMouthMovement() {
    clearInterval(lipsyncTimer);
    lipsyncTimer = setInterval(() => {
      const displacement = Math.floor(Math.random() * 25);
      const targetY1 = (135 + displacement).toFixed(1);
      const targetY2 = (145 + displacement * 1.5).toFixed(1);
      jawMesh.setAttribute('d', `M75 130 L100 ${targetY1} L125 130 L100 ${targetY2} Z`);
    }, 85);
  }

  function settleMouthPosition() {
    clearInterval(lipsyncTimer);
    jawMesh.setAttribute('d', 'M75 130 L100 135 L125 130 L100 145 Z');
  }

  async function streamGeminiPayload(prompt) {
    const accessKey = apiKeyInput.value.trim();
    if (!accessKey) { 
      status.textContent = "Error: Key Box Empty"; 
      status.style.color = "#ef4444";
      micBtn.disabled = false; 
      return; 
    }

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${accessKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      
      const parsedData = await response.json();
      const rawText = parsedData.candidates[0].content.parts[0].text;
      
      responseBox.textContent = rawText;
      processTextToVocalHardware(rawText);
    } catch (err) {
      console.error(err);
      status.textContent = "Connection Terminated";
      status.style.color = "#ef4444";
      micBtn.disabled = false;
    }
  }

  function processTextToVocalHardware(text) {
    const sanitizedText = text.replace(/[*#`_\-]/g, '');
    const speechStream = new SpeechSynthesisUtterance(sanitizedText);
    
    speechStream.onstart = () => {
      status.textContent = "Avatar Voice Active";
      status.style.color = "#10b981";
      engageMouthMovement();
    };
    
    speechStream.onend = () => {
      status.textContent = "System Disconnected";
      status.style.color = "#94a3b8";
      micBtn.disabled = false;
      settleMouthPosition();
    };

    speechStream.onerror = () => {
      status.textContent = "System Disconnected";
      status.style.color = "#94a3b8";
      micBtn.disabled = false;
      settleMouthPosition();
    };

    window.speechSynthesis.speak(speechStream);
  }

  micBtn.addEventListener('click', () => {
    if (!voiceRecognizer) return;
    micBtn.disabled = true;
    voiceRecognizer.start();
  });
</script>

</body>
</html>
